<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Intro component with sign up form</title>
</head>
<body>
  <div class="sign-up-page">
    <div class="title-container">
      <h1>Learn to code by watching others</h1>

      <p>
        See how experienced developers solve problems in real-time. Watching scripted   tutorials   is great, but understanding how developers think is invaluable.
      </p>    
    </div>

    <div class="form-container">
      <p id="try-banner">Try it free 7 days then $20/mo. thereafter</p>
      <form id="sign-up-form">
        <div class="form-group" id="first-name-group">
          <input class="form-control" id="first-name" type="text" placeholder="First Name" required>
        </div>
        <div class="form-group" id="last-name-group">
          <input class="form-control" id="last-name" type="text" placeholder="Last Name" required>
        </div>
        <div class="form-group" id="email-group">
          <input class="form-control" id="email" type="email" placeholder="Email Address" required>
        </div>
        <div class="form-group" id="password-group">
          <input class="form-control" id="password" type="password" placeholder="Password" required>
        </div>
        <button id="submit-btn" type="submit">CLAIM YOUR FREE TRIAL</button>
        <span class="disclaimer">
          By clicking the button, you are agreeing to our Terms and Services
        </span>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
