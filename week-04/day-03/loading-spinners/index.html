<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Spinners</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Loading Spinners</h1>
  <div class="spinners">
    <section>
      <h3>Rotate</h3>
      <div class="spinner-arm">
        <div id="rotate-spinner"></div>
      </div>
    </section>
    <section>
      <h3>Pulse</h3>
      <div class="spinner-container">
        <div class="pulse-spinner"></div>
        <div class="pulse-spinner"></div>
        <div class="pulse-spinner"></div>
      </div>
    </section>
    <section>
      <h3>Bounce</h3>
      <div class="spinner-container">
        <div class="bounce-spinner"></div>
        <div class="bounce-spinner"></div>
        <div class="bounce-spinner"></div>
      </div>
    </section>
    <section>
      <h3>Dots</h3>
      <div class="spinner-container">
        <div class="dots-screen">
          <div class="dots-spinner"></div>
          <div class="dots-spinner"></div>
          <div class="dots-spinner"></div>
        </div>
      </div>
    </section>
    <section>
      <h3>Skeleton</h3>
      <div class="skeleton-content">
        <div class="picture-placeholder"></div>
        <div class="text-placeholder"></div>
      </div>
      <div class="skeleton-content">
        <div class="picture-placeholder"></div>
        <div class="text-placeholder"></div>
      </div>
      <div class="skeleton-content">
        <div class="picture-placeholder"></div>
        <div class="text-placeholder"></div>
      </div>
    </section>
  </div>
</body>
</html>
