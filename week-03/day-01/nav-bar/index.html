<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my NBA Website</title>
    <link rel="stylesheet" href="style.css">
  </head>
  
  <body>
    <h1>My NBA Website</h1>
  
    <nav class="menu">
      <ul>
        <li><img src="basketball-solid.png" id="logo" alt="A basketball icon"></li>
        <li><a ref="#">News</a></li>
        <li><a ref="#">Schedule</a></li>
        <li><a ref="#">Standings</a></li>
        <li><a ref="#">Stats</a></li>
        <li><a ref="#">Teams</a></li>
      </ul>
    </nav>
  
    <div>

    </div>
  
    <div class="cards-container">

        <h4 class="name">Victor Wembanyama</h4>

      </div>
    
      <div class="players">
        <h4 class="name">Lebron James</h4>

      </div>
    
      <div class="players">
        <h4 class="name">Stephen Curry</h4>
        <p class="team">Golden States Warriors</p>
      </div>
