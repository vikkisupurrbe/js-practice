<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Name and Age</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>User Name and Age</h1>

  <!-- User Table -->
  <table>
    <thead>
      <tr>
        <th scope="col">Name</th>
        <th scope="col">Age</th>
        <th scope="col" id="remove"></th>
      </tr>
    </thead>
    <tbody id="user-list">
      <!-- Rendered by renderUser -->
    </tbody>
  </table>

  <!-- Add item form -->
  <form id="add-form-container">
    <input type="text" id="name" placeholder="Name" />
    <input type="number" id="age" placeholder="Age" />
    <button id="add-btn" type="submit">+</button>
  </form>

  <div class="result-container">
    <h4 id="count">Number of users</h4>
    <h4 id="average-age">Average age</h4>
  </div>

  <script src="dynamicForm.js"></script>
</body>

</html>
