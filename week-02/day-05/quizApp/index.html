<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimeQ</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="title">
    <h1>Welcome to AnimeQ</h1>
  </div>

  <div class="settings-container">

    <!-- Number of questions -->
    <p>Number of questions: 5</p>

    <!-- Difficulty -->
    <div class="difficulty-container">
      <button id="easy-btn">Easy</button>
      <button id="medium-btn">Medium</button>
      <button id="hard-btn">Hard</button>
    </div>

    <!-- Type of questions -->
    <p>Type of questions: Multiple Choice</p>

    <div>
      <button id="play-btn">Play</button>
    </div>

  </div>


  <!-- Tracker -->
  <div id="tracker-container">
    <!-- Rendered by renderTrackers -->
  </div>

  <!-- Quiz -->
  <div id="question-container">
    <!-- Rendered by renderQuestion -->
  </div>

  <script src="quizApp.js"></script>
</body>

</html>
